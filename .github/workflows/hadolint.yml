#
# A single Containerfile lives at the repo root, so the job lints it
# directly. Recursive mode would only build a fragile `**/./Containerfile`
# glob.
---
name: hadolint
'on':
  pull_request:
    paths: &paths
      - .github/workflows/hadolint.yml
      - Containerfile
  push:
    branches: [master]
    paths: *paths
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  hadolint:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Containerfile
