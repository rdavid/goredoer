#
# The workflow has limitations -- Ubuntu lacks a redo package, and macOS
# cannot run containers natively.
---
name: test
'on':
  pull_request:
  push:
    branches: [master]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-15
          - ubuntu-22.04
          - ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - if: runner.os == 'Linux'
        uses: redhat-actions/buildah-build@v2.13
        with:
          containerfiles: ./Containerfile
          image: goredoer
          tags: latest
      - if: runner.os == 'macOS'
        run: |
          brew install goredo
          rel=0.9.20260707
          src=https://github.com/rdavid/shellbase/archive/refs/tags
          curl \
            --location \
            --silent \
            "$src/v$rel.tar.gz" |
            tar \
              --directory /usr/local/bin \
              --extract \
              --gzip \
              --strip-components=2 \
              shellbase-"$rel"/lib/base.sh
          redo -xx lint
