#
# The additional_files input takes extension tokens, not globs -- the action
# turns each into a `find -name '*<token>'` pattern, so `.do` lints every
# *.do script. A path glob like ./*.do expands to slash-bearing patterns that
# match nothing, silently skipping every script.
---
name: shellcheck
'on':
  pull_request:
    paths: &paths
      - '*.do'
      - .github/workflows/shellcheck.yml
  push:
    branches: [master]
    paths: *paths
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  shellcheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          additional_files: .do
