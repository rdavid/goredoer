#
# The workflow pins the Vale CLI too: the action tag only pins the action,
# and its version input defaults to "latest", so a new Vale release could
# change rules and break CI without a commit here.
---
name: vale
'on':
  pull_request:
    paths: &paths
      - .github/styles/**
      - .github/workflows/vale.yml
      - .vale.ini
      - README.adoc
  push:
    branches: [master]
    paths: *paths
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  vale:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - run: |
          sudo apt-get update
          sudo apt-get install --yes asciidoctor
      - uses: vale-cli/vale-action@2.1.2
        with:
          version: 3.15.1
          fail_on_error: true
