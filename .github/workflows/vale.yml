---
name: vale
'on':
  pull_request:
  push:
    branches: [master]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  vale:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - run: |
          sudo apt-get update
          sudo apt-get install --yes asciidoctor
      - uses: vale-cli/vale-action@2.1.2
        with:
          fail_on_error: true
